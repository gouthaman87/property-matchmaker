{% extends "base.html" %}
{% block nav %}{% endblock %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/assets/propiq-logo.svg" alt="PropIQ" style="height:48px;" />
      <h2>Create Account</h2>
      <p class="auth-subtitle">UK Property Intelligence · Powered by HM Land Registry</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username" minlength="3" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="new-password" minlength="6" />
      </div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</div>
{% endblock %}
